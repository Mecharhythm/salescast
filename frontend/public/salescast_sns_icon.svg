<svg viewBox="0 0 1200 1200" width="1200" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="1200" rx="264" fill="url(#bg)"/>

  <!-- 棒グラフ -->
  <rect x="216" y="696" width="168" height="288" rx="36" fill="url(#bar)" opacity="0.7"/>
  <rect x="444" y="528" width="168" height="456" rx="36" fill="url(#bar)" opacity="0.85"/>
  <rect x="672" y="384" width="168" height="600" rx="36" fill="url(#bar)"/>

  <!-- 折れ線グラフ -->
  <polyline points="216,648 444,480 672,336 936,216" fill="none" stroke="white" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- 予測点線 -->
  <line x1="936" y1="216" x2="1080" y2="144" stroke="white" stroke-width="30" stroke-dasharray="36,36" stroke-linecap="round" opacity="0.7"/>

  <!-- 終点の丸 -->
  <circle cx="936" cy="216" r="48" fill="white"/>
</svg>
