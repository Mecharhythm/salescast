<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- 棒グラフ -->
  <rect x="18" y="58" width="14" height="24" rx="3" fill="url(#bar)" opacity="0.7"/>
  <rect x="37" y="44" width="14" height="38" rx="3" fill="url(#bar)" opacity="0.85"/>
  <rect x="56" y="32" width="14" height="50" rx="3" fill="url(#bar)"/>

  <!-- 折れ線グラフ -->
  <polyline points="18,54 37,40 56,28 78,18" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- 予測点線 -->
  <line x1="78" y1="18" x2="90" y2="12" stroke="white" stroke-width="2.5" stroke-dasharray="3,3" stroke-linecap="round" opacity="0.7"/>

  <!-- 終点の丸 -->
  <circle cx="78" cy="18" r="4" fill="white"/>
</svg>
